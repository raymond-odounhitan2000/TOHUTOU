name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

permissions:
  contents: read

jobs:
  backend:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tohutou_test
          POSTGRES_USER: tohutou
          POSTGRES_PASSWORD: tohutou_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tohutou -d tohutou_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Check imports
        env:
          DATABASE_URL: postgresql+asyncpg://tohutou:tohutou_test@localhost:5432/tohutou_test
          SECRET_KEY: ci-test-secret-key-not-for-production-use
          AES_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: |
          uv run python -c "from app.main import app; print('OK')"

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://tohutou:tohutou_test@localhost:5432/tohutou_test
          SECRET_KEY: ci-test-secret-key-not-for-production-use
          AES_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: uv run alembic upgrade head

  security-backend:
    name: Security - Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Static security scan (Bandit)
        run: uv run --with bandit bandit -q -r app -x app/alembic

      - name: Dependency vulnerability audit (pip-audit)
        run: uv run --with pip-audit pip-audit

  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build

  security-frontend:
    name: Security - Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability audit (npm audit)
        run: npm audit --omit=dev --audit-level=high

  secrets-scan:
    name: Security - Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect leaked secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker - Build image
    runs-on: ubuntu-latest
    needs: [backend, frontend, security-backend, security-frontend, secrets-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: tohutou:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
