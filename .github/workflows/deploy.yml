name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase Docker image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Koyeb
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh
          export PATH="$HOME/.koyeb/bin:$PATH"

          DB_URL="postgresql+asyncpg://${{ secrets.DATABASE_USER }}:${{ secrets.DATABASE_PASSWORD }}@${{ secrets.DATABASE_HOST }}:5432/${{ secrets.DATABASE_NAME }}"

          COMMON_ARGS=(
            --docker "${{ steps.image.outputs.name }}:${{ github.sha }}"
            --docker-command "./entrypoint.sh"
            --instance-type nano
            --region fra
            --port "8000:http"
            --port "3000:http"
            --routes "/api:8000"
            --routes "/:3000"
            --env "DATABASE_URL=${DB_URL}"
            --env "SECRET_KEY=${{ secrets.SECRET_KEY }}"
            --env "AES_KEY=${{ secrets.AES_KEY }}"
            --env "CORS_ORIGINS=${{ vars.CORS_ORIGINS }}"
            --env "S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}"
            --env "S3_BUCKET=${{ secrets.S3_BUCKET }}"
            --env "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}"
            --env "S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}"
            --env "S3_REGION=${{ vars.S3_REGION }}"
            --env "ADMIN_PHONE=${{ secrets.ADMIN_PHONE }}"
            --env "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"
          )

          if koyeb service update tohutou/tohutou-app "${COMMON_ARGS[@]}"; then
            echo "✅ Service mis à jour avec succès"
          else
            echo "⚠️  Service introuvable, création en cours..."
            koyeb app create tohutou || echo "ℹ️  App déjà existante, on continue..."
            koyeb service create tohutou-app \
              --app tohutou \
              --docker-private-registry-secret ghcr-secret \
              "${COMMON_ARGS[@]}"
            echo "✅ Service créé avec succès"
          fi