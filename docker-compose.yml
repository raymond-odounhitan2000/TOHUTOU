services:
  db:
    image: postgres:16-alpine
    container_name: tohutou_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tohutou_db}
      POSTGRES_USER: ${POSTGRES_USER:-tohutou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tohutou_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tohutou} -d ${POSTGRES_DB:-tohutou_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tohutou_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tohutou:tohutou_dev@db:5432/tohutou_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: tohutou_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
